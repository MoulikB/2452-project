<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2452-emon</title>
  </head>
  <body>
    <div id="app"></div>

    <!-- 1. the page is loaded, 2. start running code -->
    <script type="module" src="/src/main.ts"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@electric-sql/pglite-repl/dist-webcomponent/Repl.js"
      type="module"
    ></script>

    <details>
      <summary>Show/hide REPL</summary>
      <!-- Include the Repl web component in your page -->
      <pglite-repl id="repl"></pglite-repl>
    </details>
    <script type="module">
      import db from "./src/model/connection.ts";
      // Retrieve the Repl element
      const repl = document.getElementById("repl");

      // REPL to your PGlite instance
      repl.pg = db();
    </script>
  </body>
</html>
